<table class="table table-striped">
    <thead>
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Subject</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let student of students">
        <td> {{ student.firstname   }} </td>
        <td> {{ student.lastname }} </td>
        <td> {{ student.subject }} </td>
    </tr>
    </tbody>
</table>
